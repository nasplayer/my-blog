baseURL: 'https://nasplayer.github.io/'
languageCode: 'zh-cn'
title: '我的个人博客'
theme: 'PaperMod'

params:
  homeInfoParams:
    Title: "欢迎来到我的博客 👋"
    Content: "分享技术、生活与思考"
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true

  socialIcons:
    - name: github
      url: "https://github.com/nasplayer"

menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 20
    - identifier: search
      name: 搜索
      url: /search/
      weight: 30
    - identifier: admin
      name: 管理
      url: /admin/
      weight: 40

outputs:
  home:
    - HTML
    - RSS
    - JSON

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true
