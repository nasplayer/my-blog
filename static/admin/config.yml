backend:
  name: github
  repo: nasplayer/my-blog
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "posts"
    label: "文章"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "标题", name: "title", widget: "string", required: true}
      - {label: "发布日期", name: "date", widget: "datetime", required: true}
      - {label: "草稿", name: "draft", widget: "boolean", default: false}
      - label: "分类"
        name: "categories"
        widget: "list"
        required: false
      - label: "标签"
        name: "tags"
        widget: "list"
        required: false
      - {label: "正文", name: "body", widget: "markdown", required: true}

  - name: "pages"
    label: "页面"
    folder: "content"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "标题", name: "title", widget: "string", required: true}
      - {label: "发布日期", name: "date", widget: "datetime", required: true}
      - {label: "草稿", name: "draft", widget: "boolean", default: false}
      - {label: "正文", name: "body", widget: "markdown", required: true}
